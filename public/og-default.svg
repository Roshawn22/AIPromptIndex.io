<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="glow" x1="400" y1="200" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="400" ry="250" fill="url(#glow)"/>
  <!-- Logo mark -->
  <rect x="520" y="190" width="64" height="64" rx="12" fill="url(#accent)"/>
  <path d="M540 206l16 16-16 16" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M549 226h14" stroke="#5eead4" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- Site name -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="48" fill="#f5f5f5" letter-spacing="-1">
    <tspan fill="#f5f5f5">AI</tspan><tspan fill="#2dd4bf">PromptIndex</tspan>
  </text>
  <!-- Tagline -->
  <text x="600" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="24" fill="#a3a3a3">
    The AI Prompt Library
  </text>
  <!-- URL -->
  <text x="600" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="18" fill="#737373">
    aipromptindex.io
  </text>
  <!-- Border accent -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#accent)"/>
</svg>
