name: SEO AI Ops

on:
  schedule:
    - cron: "30 15 * * *"
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read

concurrency:
  group: seo-ai-ops-main
  cancel-in-progress: false

jobs:
  ai-ops:
    name: Generate Anthropic SEO Ops Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Anthropic key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [[ -z "$ANTHROPIC_API_KEY" ]]; then
            echo "ANTHROPIC_API_KEY secret is required for SEO AI Ops."
            exit 1
          fi

      - name: Resolve latest SEO Data Pull run with an artifact
        id: source_run
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          # Gate-skipped scheduled runs conclude "success" without uploading an
          # artifact, so check each candidate run actually produced one.
          candidates="$(gh run list --workflow 'SEO Data Pull' --branch "$DEFAULT_BRANCH" --json databaseId,status,conclusion -L 20 --jq 'map(select(.status=="completed" and .conclusion=="success")) | .[].databaseId')"
          run_id=""
          for candidate in $candidates; do
            if gh api "repos/$GITHUB_REPOSITORY/actions/runs/$candidate/artifacts" --jq '.artifacts[].name' | grep -qx "seo-data-pull-$candidate"; then
              run_id="$candidate"
              break
            fi
          done
          if [[ -z "$run_id" ]]; then
            echo "No successful SEO Data Pull run with an artifact found on branch $DEFAULT_BRANCH."
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "artifact_name=seo-data-pull-$run_id" >> "$GITHUB_OUTPUT"

      - name: Download latest SEO data pull artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/seo-data-pull
          gh run download "${{ steps.source_run.outputs.run_id }}" \
            --name "${{ steps.source_run.outputs.artifact_name }}" \
            --dir /tmp/seo-data-pull

      - name: Restore SEO output snapshot
        shell: bash
        run: |
          artifact_dir="/tmp/seo-data-pull/${{ steps.source_run.outputs.artifact_name }}"
          if [[ ! -d "$artifact_dir" ]]; then
            echo "Downloaded artifact directory not found: $artifact_dir"
            exit 1
          fi
          mkdir -p output/seo
          cp -R "$artifact_dir"/. output/seo/
          date_label="$(find output/seo -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort | tail -n 1)"
          if [[ -z "$date_label" ]]; then
            echo "No SEO output date found after restoring artifact."
            exit 1
          fi
          echo "SEO_OUTPUT_DATE=$date_label" >> "$GITHUB_ENV"

      - name: Generate AI SEO ops artifacts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_SEO_MODEL: ${{ vars.ANTHROPIC_SEO_MODEL || 'claude-opus-4-8' }}
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
        run: npm run seo:ops:ai -- --date="$SEO_OUTPUT_DATE"

      - name: Upload AI SEO artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: seo-ai-ops-${{ github.run_id }}
          path: output/seo/
          if-no-files-found: error
